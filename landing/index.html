<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Self-Coach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #999;
      margin-bottom: 2.5rem;
      text-align: center;
      line-height: 1.5;
    }
    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      background: #16213e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-decoration: none;
      color: #eee;
      width: 240px;
      transition: border-color 0.2s, transform 0.2s;
    }
    a.card:hover {
      border-color: #4ecca3;
      transform: translateY(-2px);
    }
    .card .icon { font-size: 2.5rem; }
    .card .label { font-size: 1.15rem; font-weight: 600; }
    .card .desc { font-size: 0.85rem; color: #999; text-align: center; line-height: 1.4; }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #555;
    }
    footer a { color: #777; }
  </style>
</head>
<body>
  <h1>Chess Self-Coach</h1>
  <p class="subtitle">Opening repertoire manager + mistake trainer</p>

  <div class="cards">
    <a class="card" href="docs/">
      <span class="icon">&#128214;</span>
      <span class="label">Documentation</span>
      <span class="desc">Setup guide, CLI reference, API docs</span>
    </a>
    <a class="card" href="train/">
      <span class="icon">&#9823;</span>
      <span class="label">Training</span>
      <span class="desc">Find the better move — drill your mistakes</span>
    </a>
  </div>

  <footer>
    <a href="https://github.com/Bobain/chess-self-coach">GitHub</a>
  </footer>
</body>
</html>
